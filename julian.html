<script>
  let selected = "E"
  let n = [
    ["E", "E", "E", "E", "E", "E", "E", "E"],
    ["invisible", "E", "E", "E", "E", "E", "E", "E", "E"],
    ["E", "E", "E", "E", "E", "E", "E", "E"],
    ["invisible", "E", "E", "E", "E", "E", "E", "E", "E"]
  ]
  function render(){
      document.getElementById("app-root").innerHTML = ""
    for (let item of n){
        let div = document.createElement("div");
          for (let i = 0; i < item.length; i++){
              let ele = document.createElement("button");
              ele.style.height = "50px";
              ele.style.width = "50px";
              ele.textContent = item[i];
             
              if (item[i] === "invisible"){
                  ele.style.width = "15px";
                  ele.style.backgroundColor = "white";
                  ele.style.border = 0;
                  ele.textContent = ""
              } else {
                   ele.addEventListener("click", () => {
                      ele.textContent = selected;
                      item[i] = selected;
                      selected = "E"
                  });
              }
              div.appendChild(ele)
          }
        document.getElementById("app-root").appendChild(div)
        document.getElementById("app-root").appendChild(document.createElement("br"))
    }
  }
  
</script>
